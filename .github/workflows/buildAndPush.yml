name: Build and Push
on:
  push:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.305'
      - run: dotnet restore Academy/Kakushkin_NewsFeed.sln
      - run: dotnet test Academy/Kakushkin_NewsFeed.sln --no-restore --verbosity normal

  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: debah
        run: ls -R

      - name: Build and push backend
        uses: docker/build-push-action@v7
        with:
          context: ./Academy
          push: true
          tags: dkakushkin/academy:latest
      - name: Degug
        run: ls -r

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./Academy-front/newsfeed-frontend
          push: true
          tags: dkakushkin/frontend:latest  

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd ~/Academy-deploy
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f   # убирает неиспользуемые образы