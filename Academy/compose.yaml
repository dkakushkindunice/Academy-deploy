services:
  db:
    image: postgres:16
    container_name: newsfeed-postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-newsfeed}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-newsfeed}"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - 5433:5432
      
  kakushkin_newsfeed.host:
    image: kakushkin_newsfeed.host
    build:
      context: .
      dockerfile: Dockerfile
    container_name: newsfeed-api-local
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${POSTGRES_DB:-newsfeed};Username=${POSTGRES_USER:-app};Password=${POSTGRES_PASSWORD:-secret}"
    ports:
      - "8080:8080"     
      # - "8081:8081"   
    restart: unless-stopped

volumes:
  db_data:
