events {}

http {
server {
        listen 80;
        server_name kakushkin-dima.ru www.kakushkin-dima.ru;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            allow all;
        }
        
        location / {
            return 301 https://$server_name$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name kakushkin-dima.ru www.kakushkin-dima.ru;

        ssl_certificate /etc/letsencrypt/live/kakushkin-dima.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/kakushkin-dima.ru/privkey.pem;

        location / {
            proxy_pass http://newsfeed-frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization,Content-Type,Accept,Origin,X-Requested-With" always;
            add_header Access-Control-Allow-Credentials true always;


            proxy_pass http://newsfeed-api:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
