services:
  db:
    image: postgres:16
    container_name: newsfeed-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-newsfeed}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-newsfeed}"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: Academy
      dockerfile: src/Kakushkin_NewsFeed.Host/Dockerfile
    container_name: newsfeed-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${POSTGRES_DB:-newsfeed};Username=${POSTGRES_USER:-app};Password=${POSTGRES_PASSWORD:-secret}"
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: Academy-front/newsfeed-frontend
      dockerfile: Dockerfile
    container_name: newsfeed-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  db_data:
